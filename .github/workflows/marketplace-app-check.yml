name: Marketplace App Check

on:
  pull_request:
    paths:
      - "registry/apps_v2.json"

jobs:
  semgrep-check:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure PR is up to date with ${{ github.event.pull_request.base.ref }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if ! git merge-base --is-ancestor "$BASE_SHA" "$HEAD_SHA"; then
            echo "::error::This PR is behind ${{ github.event.pull_request.base.ref }}. Merge or rebase the latest ${{ github.event.pull_request.base.ref }} into your branch, then push again — dependency checks run against the base branch and need it up to date."
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install semgrep
        run: uv tool install semgrep

      - name: Get base apps_v2.json
        run: git show ${{ github.event.pull_request.base.sha }}:registry/apps_v2.json > /tmp/apps_before.json

      - name: Check changed marketplace apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_marketplace_apps.py /tmp/apps_before.json registry/apps_v2.json